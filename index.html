<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>sPutta</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0e0e0d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="sPutta">
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src='https://unpkg.com/tesseract.js@4.1.1/dist/tesseract.min.js'></script>
<script type="module" src="script.js"></script>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="loading-screen">
  <div class="splash-logo"><span>sPutta</span></div>
  <div class="splash-dots">
    <div class="splash-dot"></div><div class="splash-dot"></div><div class="splash-dot"></div>
  </div>
</div>
<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo"><span>sPutta</span></div>
    <div class="auth-tagline">Difficult Words, Explained</div>
    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login">Sign In</button>
      <button class="auth-tab" id="tab-signup">Get Started</button>
    </div>
    <div id="login-form">
      <div class="auth-field"><label>Email</label>
        <input type="email" id="login-email" placeholder="you@gmail.com" autocomplete="email"/></div>
      <div class="auth-field"><label>Password</label>
        <input type="password" id="login-pass" placeholder="Your password" autocomplete="current-password"/></div>
      <div class="forgot-link" id="forgot-link">Forgot password?</div>
      <button class="auth-submit" id="login-btn">
        <span class="auth-btn-text">Sign In</span>
        <div class="auth-spinner"></div>
      </button>
      <div class="auth-error" id="login-error"></div>
    </div>
    <div id="signup-form" style="display:none">
      <div class="auth-field"><label>Email</label>
        <input type="email" id="signup-email" placeholder="you@gmail.com" autocomplete="email"/></div>
      <div class="auth-field"><label>Password</label>
        <input type="password" id="signup-pass" placeholder="At least 6 characters" autocomplete="new-password"/></div>
      <div class="auth-field"><label>Confirm Password</label>
        <input type="password" id="signup-pass2" placeholder="Repeat password" autocomplete="new-password"/></div>
      <button class="auth-submit" id="signup-btn">
        <span class="auth-btn-text">Create Account</span>
        <div class="auth-spinner"></div>
      </button>
      <div class="auth-error" id="signup-error"></div>
    </div>

    <div class="auth-note">Conversations are stored in your account and accessible on any device.</div>
  </div>
</div>
<div class="overlay" id="overlay"></div>
<aside class="sidebar" id="sidebar">
  <div class="sidebar-top">
    <div class="logo"><span>sPutta</span></div>
    <div class="tagline">Difficult Words, Explained</div>
  </div>
  <div class="sidebar-btns">
    <button class="btn-new" id="new-chat">New Session</button>
    <button class="btn-clear" id="clear-all">Clear All</button>
    <button class="btn-clear" id="search-btn">Explore</button>
  </div>
  
  <div class="search-box" id="search-box">
  <input class="search-input" id="search-input" placeholder="Explore chats..."/>
</div>
  <div class="history-label">Recap</div>
  <div class="history-list" id="history-list"></div>
</aside>

<div class="main">
  <div class="topbar">
    <button class="menu-btn" id="menu-btn">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" viewBox="0 0 24 24">
        <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>
    <div class="chat-title" id="chat-title">New Session</div>
    <div class="topbar-right">
      <div class="network-pill" id="network-pill">
  <div class="network-dot" id="network-dot"></div>
  <span id="network-text">Connected</span>
</div>
      <div class="user-pill" id="user-pill">
        <div class="user-avatar" id="user-avatar">?</div>
        <span class="user-email-text" id="user-email-text"></span>
      </div>
      <button class="btn-signout" id="signout-btn">Log Off</button>
      <button class="tb-btn" id="export-btn" title="Export chat">
        <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
          <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
      </button>
      <button class="tb-btn" id="theme-btn" title="Toggle theme">
        <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
      </button>
    </div>
  </div>

  <div class="messages" id="messages"></div>

  <div class="input-bar">
    <div class="pending-strip" id="pending-strip">
      <div class="pending-icon">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/>
        </svg>
      </div>
      <div class="pending-info">
        <div class="pending-name" id="pending-name">file.pdf</div>
        <div class="pending-meta" id="pending-meta">PDF ready</div>
      </div>
      <button class="pending-remove" id="pending-remove">&#x2715;</button>
    </div>
    <div class="input-inner">
      <div class="textarea-box">
        <textarea id="msg-input" rows="1" placeholder="Ask anything, or attach a file or insert image..."></textarea>
        <div class="box-actions">
          <button class="box-btn" id="upload-btn" title="Attach PDF">
            <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
              <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
              <polyline points="14 2 14 8 20 8"/>
              <line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/>
            </svg>
          </button>
          <input type="file" id="file-input" accept="*/*" style="display:none"/>
          <button class="mic-btn" id="mic-btn" title="Voice input">
  <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
    <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
    <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
    <line x1="12" y1="19" x2="12" y2="23"/>
    <line x1="8" y1="23" x2="16" y2="23"/>
  </svg>
</button>
          <button class="send-btn" id="send-btn">
            <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
              <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
          </button>
        </div>
      </div>
      <div class="input-toolbar">
        <div class="toolbar-left">
          <button class="tool-btn" data-prompt="Explain in simple words...">
            <svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            <span class="tool-label">Explain simply</span>
          </button>
          <div class="tb-div"></div>
          <button class="tool-btn" data-prompt="Give me a short summary of this.">
            <svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
            <span class="tool-label">Summarise</span>
          </button>
          <div class="tb-div"></div>
          <button class="tool-btn" data-prompt="Give me the highlights or key points">
            <svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <span class="tool-label">Key points</span>
          </button>
        </div>
        <div class="toolbar-right">
          <button class="stop-pill" id="stop-btn">Pause</button>
          <button class="retry-pill" id="retry-btn">Re-run</button>
          <span class="hint-text">Send with Enter</span>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<script src="script.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js');
    });
  }
</script>
</body>
</html>
